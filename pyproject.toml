[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
dependencies = [
  "numpy >= 1.20.0, < 2.0.0",
  "h5py",
  "Flask",
  "pyproj",
  "psycopg",
  "dtcc-io@git+https://github.com/dtcc-platform/dtcc-io.git@develop"
  "dtcc-model@git+https://github.com/dtcc-platform/dtcc-model.git@develop"
]

name = "dtcc-data"
version = "0.0.1"
description = "DTCC Data"
readme = "README.md"
authors = [{ name = "Dag Wästberg", email = "dwastberg@gmail.com" }]
requires-python = ">=3.8"
classifiers = [
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
]
[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
dtcc-import-elevation-data = "dtcc_data.scripts:las_to_elevation_data.main"


[tool.cibuildwheel]
test-command = "pytest {project}/tests"
build-verbosity = 1
